# Enable Syft's sbom-cataloger in addition to the default image catalogers.
# NUT, libmodbus, and net-snmp are compiled from source (no apk package), so
# the defaults record their files but no package identity; the sbom-cataloger
# is not in syft's default image cataloger set, and without it the embedded
# CycloneDX fragment the Dockerfile ships at /usr/share/sbom/nut-upsd.cdx.json
# never reaches the signed release SBOM. Enabling it here imports those
# components' name/version/purl entries so advisories can be matched against
# shipped images. The central release workflow auto-detects this file and
# passes it to anchore/sbom-action and the no-change gate's fresh scan.
select-catalogers: ["+sbom-cataloger"]
